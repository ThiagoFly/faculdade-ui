<link rel="stylesheet" href="https://unpkg.com/primeflex@latest/primeflex.css">

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeBlocks Example</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/primeblocks@1.0.0-beta.8/primeblocks.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/primeicons@6.0.0/primeicons.css">
</head>
<body>
    <div class="surface-card p-4 shadow-2 border-round w-full lg:w-6">
        <div class="text-center mb-5">
            <img src="assets/universidade-anhanguera-logo-1.png" alt="Image" height="100" class="mb-3">
            
           
                <span class="p-float-label">
               
            </span>
            
        </div>

        <div>
            <label for="email1" class="block text-900 font-medium mb-2">Email</label>
            <input id="email1" type="text" placeholder="Endereço de email" pInputText class="w-full mb-3">

            <label for="password1" class="block text-900 font-medium mb-2">Senha</label>
            <input id="password1" type="password" placeholder="Senha" pInputText class="w-full mb-3">

            <div class="flex align-items-center justify-content-between mb-6">
                <div class="flex align-items-center">
                    
                </div>
                
            </div>

            <button pButton pRipple label="Entrar" icon="pi pi-user" class="w-full"></button>
        </div>
    </div>
</body>
</html>
